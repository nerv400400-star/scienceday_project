<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mhunji</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: "Pretendard", "Noto Sans KR", Arial, sans-serif;
      overflow: hidden;
    }

    .back {
      position: fixed;
      top: 18px;
      left: 18px;
      z-index: 20;
      padding: 12px 16px;
      border-radius: 999px;
      background: rgba(0,0,0,0.72);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      border: 1px solid rgba(255,255,255,0.16);
      backdrop-filter: blur(8px);
    }

    .viewer {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.8s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    .slide.active {
      opacity: 1;
      z-index: 2;
    }

    .slide img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }

    .caption {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 20;
      padding: 12px 16px;
      border-radius: 16px;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.12);
      font-weight: 700;
      color: #f2f2f2;
    }
  </style>
</head>
<body>
  <a class="back" href="index.html">← 이전으로</a>

  <div class="viewer">
    <div class="slide active"><img src="no_ahe.jpg" alt="image 1"></div>
    <div class="slide"><img src="no_heart.jpeg" alt="image 2"></div>
    <div class="slide"><img src="no_koala.webp" alt="image 3"></div>
    <div class="slide"><img src="no_surprise.jpeg" alt="image 4"></div>
    <div class="slide"><img src="no_tough.png" alt="image 5"></div>
  </div>

  <script>
    const slides = document.querySelectorAll('.slide');
    let current = 0;

    function showSlide(index) {
      slides.forEach((slide, i) => {
        slide.classList.toggle('active', i === index);
      });
    }

    setInterval(() => {
      current = (current + 1) % slides.length;
      showSlide(current);
    }, 3000);
  </script>
</body>
</html>
