<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>실제 예방 자료 구현</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Pretendard", "Noto Sans KR", Arial, sans-serif;
      background: #04070d;
      color: #fff;
    }
    .back {
      position: fixed;
      top: 18px;
      left: 18px;
      z-index: 100;
      padding: 12px 16px;
      border-radius: 999px;
      background: rgba(0,0,0,0.72);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      border: 1px solid rgba(255,255,255,0.16);
      backdrop-filter: blur(8px);
    }
    .wrap {
      width: min(1120px, calc(100% - 40px));
      margin: 0 auto;
      padding: 90px 0 40px;
    }
    .small {
      font-size: 0.95rem;
      color: #cfd8ff;
      font-weight: 700;
      margin-bottom: 10px;
    }
    h1 {
      margin: 0 0 22px;
      font-size: clamp(2rem, 4vw, 3.6rem);
      line-height: 1.05;
      letter-spacing: -0.05em;
    }
    .stage {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 28px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 18px 50px rgba(0,0,0,0.35);
      background: #09111f;
    }
    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.6s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #09111f;
    }
    .slide.active {
      opacity: 1;
      z-index: 2;
    }
    .slide img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #09111f;
    }
    .zoom img {
      animation: zoomIn 1s ease forwards;
    }
    @keyframes zoomIn {
      from { transform: scale(1); }
      to { transform: scale(1.12); }
    }
    .pulse-dot {
      position: absolute;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #ff2d2d;
      box-shadow: 0 0 0 0 rgba(255,45,45,0.7), 0 0 18px 8px rgba(255,45,45,0.55);
      transform: translate(-50%, -50%);
      opacity: 0;
      z-index: 3;
    }
    .pulse-dot.animating {
      animation: dotPulse 0.9s infinite;
    }
    @keyframes dotPulse {
      0% { box-shadow: 0 0 0 0 rgba(255,45,45,0.6), 0 0 18px 8px rgba(255,45,45,0.5); }
      70% { box-shadow: 0 0 0 18px rgba(255,45,45,0), 0 0 22px 10px rgba(255,45,45,0.36); }
      100% { box-shadow: 0 0 0 0 rgba(255,45,45,0), 0 0 18px 8px rgba(255,45,45,0.5); }
    }
    .guide {
      margin-top: 18px;
      display: inline-block;
      padding: 12px 16px;
      border-radius: 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      font-weight: 700;
      color: #d7def5;
    }
  </style>
</head>
<body>
  <a class="back" href="index.html">← 이전으로</a>

  <div class="wrap">
    <div class="small">실제 예방 자료 구현</div>
    <h1>약물의 체내 전달과 뇌 신경계 영향 시각화</h1>

    <div class="stage" id="stage">
      <div class="slide active" id="slide-vessel">
        <img src="vessel_map.png" alt="인체 혈관 및 장기 지도" />
        <div class="pulse-dot" id="pulse-dot"></div>
      </div>
      <div class="slide" id="slide-brain">
        <img src="brain.jpg" alt="뇌 자극 이미지" />
      </div>
      <div class="slide" id="slide-synapse">
        <img src="synapse.jpg" alt="시냅스 전달 이미지" />
      </div>
    </div>

    <div class="guide" id="guide">다시 재생하고 싶으면 스페이스바를 누르세요</div>
  </div>

  <script>
    const slideVessel = document.getElementById('slide-vessel');
    const slideBrain = document.getElementById('slide-brain');
    const slideSynapse = document.getElementById('slide-synapse');
    const pulseDot = document.getElementById('pulse-dot');
    const stage = document.getElementById('stage');

    let timers = [];
    let frameId = null;

    function clearAll() {
      timers.forEach(clearTimeout);
      timers = [];
      if (frameId) cancelAnimationFrame(frameId);
      frameId = null;
    }

    function resetSlides() {
      slideVessel.classList.add('active');
      slideBrain.classList.remove('active', 'zoom');
      slideSynapse.classList.remove('active', 'zoom');
      pulseDot.style.opacity = '0';
      pulseDot.classList.remove('animating');
    }

    function setDotPosition(xPercent, yPercent) {
      const rect = stage.getBoundingClientRect();
      pulseDot.style.left = (rect.width * xPercent) + 'px';
      pulseDot.style.top = (rect.height * yPercent) + 'px';
    }

    function animatePath(duration = 2000) {
      const points = [
        { x: 0.18, y: 0.57 },
        { x: 0.25, y: 0.52 },
        { x: 0.33, y: 0.47 },
        { x: 0.42, y: 0.41 },
        { x: 0.51, y: 0.31 },
        { x: 0.56, y: 0.20 }
      ];

      const start = performance.now();
      pulseDot.style.opacity = '1';
      pulseDot.classList.add('animating');

      function frame(now) {
        const elapsed = now - start;
        const t = Math.min(elapsed / duration, 1);
        const total = points.length - 1;
        const scaled = t * total;
        const idx = Math.min(Math.floor(scaled), total - 1);
        const localT = scaled - idx;

        const p1 = points[idx];
        const p2 = points[idx + 1];
        const x = p1.x + (p2.x - p1.x) * localT;
        const y = p1.y + (p2.y - p1.y) * localT;
        setDotPosition(x, y);

        if (t < 1) {
          frameId = requestAnimationFrame(frame);
        }
      }

      frameId = requestAnimationFrame(frame);
    }

    function startSequence() {
      clearAll();
      resetSlides();

      animatePath(2000);

      timers.push(setTimeout(() => {
        slideVessel.classList.remove('active');
        slideBrain.classList.add('active', 'zoom');
      }, 2000));

      timers.push(setTimeout(() => {
        slideBrain.classList.remove('active', 'zoom');
        slideSynapse.classList.add('active', 'zoom');
      }, 3000));

      timers.push(setTimeout(() => {
        slideSynapse.classList.remove('zoom');
      }, 4200));
    }

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        startSequence();
      }
    });

    window.addEventListener('resize', () => {
      setDotPosition(0.18, 0.57);
    });

    startSequence();
  </script>
</body>
</html>
