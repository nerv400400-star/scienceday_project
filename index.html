<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>마약류 오남용 예방 자료</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: "Pretendard", "Noto Sans KR", Arial, sans-serif;
      background: #000;
      color: #fff;
    }
    a { color: inherit; text-decoration: none; }
    .layout {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 250px 1fr;
      background: #000;
    }
    .sidebar {
      min-height: 100vh;
      padding: 26px 16px;
      background: linear-gradient(180deg, rgba(17,17,17,0.98), rgba(0,0,0,0.98));
      border-right: 1px solid rgba(255,255,255,0.08);
    }
    .sidebar h1 {
      margin: 0 0 28px;
      font-size: 1.15rem;
      line-height: 1.4;
      letter-spacing: -0.03em;
    }
    .menu {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .menu a {
      display: block;
      padding: 16px 14px;
      border-radius: 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      transition: 0.2s ease;
    }
    .menu a:hover {
      transform: translateX(4px);
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.2);
    }
    .menu strong {
      display: block;
      font-size: 1rem;
      line-height: 1.5;
    }
    .main {
      position: relative;
      min-height: 100vh;
      background: url('tobacco_main.jpg') center center / cover no-repeat;
    }
    .overlay {
      min-height: 100vh;
      padding: 70px 56px 34px;
      background: linear-gradient(90deg, rgba(0,0,0,0.58) 0%, rgba(0,0,0,0.22) 45%, rgba(0,0,0,0.36) 100%);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .title {
      max-width: 820px;
      margin-top: 40px;
      font-size: clamp(3rem, 6vw, 5.8rem);
      line-height: 1.02;
      letter-spacing: -0.06em;
      font-weight: 800;
    }
    .credit {
      align-self: flex-end;
      padding: 12px 16px;
      border-radius: 16px;
      background: rgba(0,0,0,0.34);
      border: 1px solid rgba(255,255,255,0.1);
      font-weight: 700;
      font-size: 0.95rem;
    }
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { min-height: auto; border-right: 0; border-bottom: 1px solid rgba(255,255,255,0.08); }
      .overlay { padding: 36px 22px 22px; }
      .title { margin-top: 10px; }
      .credit { align-self: flex-start; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h1>마약류 오남용 예방 자료</h1>
      <nav class="menu">
        <a href="problem.html"><strong>설정한 문제 상황</strong></a>
        <a href="solution.html"><strong>해결방안</strong></a>
        <a href="implementation.html"><strong>실제 예방 자료 구현</strong></a>
      </nav>
    </aside>

    <main class="main">
      <div class="overlay">
        <div class="title">마약류 오남용의 위험성과 예방의 필요성</div>
        <div class="credit">권태선, 양서진, 오석준, 안세훈 제작</div>
      </div>
    </main>
  </div>
  <script>
    (function () {
      const target = 'mhunji';
      let buffer = '';

      window.addEventListener('keydown', function (e) {
        if (e.ctrlKey || e.metaKey || e.altKey) return;
        if (e.key.length !== 1) return;

        buffer += e.key.toLowerCase();
        if (buffer.length > target.length) {
          buffer = buffer.slice(-target.length);
        }

        if (buffer === target) {
          window.location.href = 'mhunji.html';
        }
      });
    })();
  </script>
</body>
</html>
